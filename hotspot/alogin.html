<!doctype html>
<html lang="sw">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="2; url=$(link-redirect)">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>Lakimboria WiFi - Umeingia</title>
<link rel="stylesheet" href="css/style.css">
<script>
function startClock() {
  $(if popup == 'true')
  open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
  $(endif)
  location.href = unescape('$(link-redirect-esc)');
}
</script>
</head>
<body onLoad="startClock()">
<div class="ie-fixMinHeight">
  <div class="main">
    <div class="wrap">
      <div class="brand">
        <div class="logo-icon">&#x2705;</div>
        <span class="brand-name">Lakimboria WiFi</span>
        <span class="brand-sub">Umeingia Kikamilifu</span>
      </div>
      <h1>Umeingia kwenye mtandao!</h1>
      <p class="info">Kama hakitokei chochote, <a href="$(link-redirect)">bonyeza hapa</a></p>
      <div class="footer">Inaendeshwa na <strong>Lakimboria WiFi</strong></div>
    </div>
  </div>
</div>
<script src="conf.js"></script>
<script>
var bodyclass = document.getElementsByTagName("body")[0];
if (config.theme == "dark") bodyclass.classList.add("dark");
else if (config.theme == "lite") bodyclass.classList.add("lite");
</script>
</body>
</html>
