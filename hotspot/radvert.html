<!doctype html>
<html lang="sw">
<head>
<meta http-equiv="refresh" content="2; url=$(link-orig)">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<title>Lakimboria WiFi - Tangazo</title>
<link rel="stylesheet" href="css/style.css">
<script>
var popup = '';
function openOrig() {
  if (window.focus) popup.focus();
  location.href = unescape('$(link-orig-esc)');
}
function openAd() {
  location.href = unescape('$(link-redirect-esc)');
}
function openAdvert() {
  if (window.name != 'hotspot_advert') {
    popup = open('$(link-redirect)', 'hotspot_advert', '');
    setTimeout("openOrig()", 1000);
    return;
  }
  setTimeout("openAd()", 1000);
}
</script>
</head>
<body onLoad="openAdvert()">
<div class="ie-fixMinHeight">
  <div class="main">
    <div class="wrap">
      <div class="brand">
        <div class="logo-icon">&#x1F4F1;</div>
        <span class="brand-name">Lakimboria WiFi</span>
        <span class="brand-sub">Tangazo</span>
      </div>
      <h1>Tangazo</h1>
      <p class="info">Kama hakitokei chochote, fungua <a href="$(link-redirect)" target="hotspot_advert">tangazo</a> mwenyewe.</p>
      <div class="footer">Inaendeshwa na <strong>Lakimboria WiFi</strong></div>
    </div>
  </div>
</div>
</body>
</html>
