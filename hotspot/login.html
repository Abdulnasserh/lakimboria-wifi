<!doctype html>
<html lang="sw">
<head>
<meta charset="utf-8">
<meta http-equiv="pragma" content="no-cache" />
<meta http-equiv="expires" content="-1" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lakimboria WiFi - Ingia</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="ie-fixMinHeight">
  <div class="main">
    <div class="wrap animated fadeIn">
      <div class="brand">
        <div class="logo-icon">&#x1F4E1;</div>
        <span class="brand-name">Lakimboria WiFi</span>
        <span class="brand-sub">Internet Bila Wires</span>
      </div>

      $(if chap-id)
      <form name="sendin" action="$(link-login-only)" method="post" style="display:none">
        <input type="hidden" name="username" />
        <input type="hidden" name="password" />
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
      </form>
      <script src="/md5.js"></script>
      <script>
        function doLogin() {
          document.sendin.username.value = document.login.username.value;
          document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
          document.sendin.submit();
          return false;
        }
      </script>
      $(endif)

      <div class="mode" id="modeSwitch">
        <button id="voucher" class="mode-btn active" onclick="switchMode('voucher')">Vocha</button>
        <button id="member" class="mode-btn" onclick="switchMode('member')">Mtumiaji</button>
      </div>

      <form autocomplete="off" name="login" action="$(link-login-only)" method="post" $(if chap-id) onSubmit="return doLogin()" $(endif)>
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />

        $(if error)
        <div class="notice">$(error)</div>
        $(endif)

        <div class="info">$(if trial == 'yes')Jaribio la bure linapatikana, <a href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)">bonyeza hapa</a>.$(endif)</div>

        <label>
          <img class="ico" src="img/user.svg" alt="" />
          <input id="userInput" name="username" type="text" value="$(username)" placeholder="Jina la Mtumiaji / Kodi ya Vocha" />
        </label>

        <label>
          <img class="ico" src="img/password.svg" alt="" />
          <input name="password" type="password" placeholder="Nywila" />
        </label>

        <input type="submit" value="Unganisha" />
      </form>

      <div class="footer">Inaendeshwa na <strong>Lakimboria WiFi</strong> &middot; MikroTik Hotspot</div>
    </div>
  </div>
</div>

<script src="conf.js"></script>
<script>
var modeEl = document.getElementById('modeSwitch');
var userInput = document.getElementById('userInput');

function switchMode(mode) {
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(mode).classList.add('active');
  if (mode === 'voucher') {
    userInput.placeholder = 'Kodi ya Vocha';
  } else {
    userInput.placeholder = 'Jina la Mtumiaji';
  }
}

if (config.defaultMode === 'member') {
  switchMode('member');
}

var bodyclass = document.getElementsByTagName('body')[0];
if (config.theme === 'dark') bodyclass.classList.add('dark');
else if (config.theme === 'lite') bodyclass.classList.add('lite');
</script>

</body>
</html>
